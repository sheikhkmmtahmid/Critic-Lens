<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="48" height="48">
  <!-- cinema noir palette: gold = critics, deep red = audience
       the lens aperture mirrors the CriticLens name -->
  <circle cx="24" cy="24" r="23" fill="#0b0b0f" stroke="#d4af37" stroke-width="1.5"/>

  <!-- aperture petals: alternating critic-gold and audience-red -->
  <ellipse cx="24" cy="24" rx="5" ry="12" fill="#d4af37" opacity="0.93"
    transform="rotate(0 24 24) translate(0 -6)"/>
  <ellipse cx="24" cy="24" rx="5" ry="12" fill="#b11226" opacity="0.93"
    transform="rotate(60 24 24) translate(0 -6)"/>
  <ellipse cx="24" cy="24" rx="5" ry="12" fill="#d4af37" opacity="0.93"
    transform="rotate(120 24 24) translate(0 -6)"/>
  <ellipse cx="24" cy="24" rx="5" ry="12" fill="#b11226" opacity="0.93"
    transform="rotate(180 24 24) translate(0 -6)"/>
  <ellipse cx="24" cy="24" rx="5" ry="12" fill="#d4af37" opacity="0.93"
    transform="rotate(240 24 24) translate(0 -6)"/>
  <ellipse cx="24" cy="24" rx="5" ry="12" fill="#b11226" opacity="0.93"
    transform="rotate(300 24 24) translate(0 -6)"/>

  <!-- centre aperture hole -->
  <circle cx="24" cy="24" r="8.5" fill="#0b0b0f"/>

  <!-- CL monogram in warm ivory -->
  <text x="24" y="28.5" text-anchor="middle" font-family="Georgia, serif"
    font-weight="700" font-size="9" fill="#f8f1e7" letter-spacing="-0.5">CL</text>
</svg>
